<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>ESchool Portal - Student</title>
    <meta charset="UTF-8"/>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #f0f2f5;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        .page-content {
            flex: 1;
            max-width: 700px;
            margin: 48px auto;
            padding: 0 24px;
            width: 100%;
        }
        .card {
            background: #fff;
            border-radius: 12px;
            padding: 40px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
        }
        .student-header {
            display: flex;
            align-items: center;
            gap: 24px;
            margin-bottom: 32px;
            padding-bottom: 24px;
            border-bottom: 2px solid #e8eaf6;
        }
        .student-avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: 3px solid #1a237e;
            object-fit: cover;
        }
        .student-header h1 { color: #1a237e; font-size: 26px; }
        .student-header p { color: #7986cb; font-size: 14px; margin-top: 4px; }
        .info-row {
            display: flex;
            justify-content: space-between;
            padding: 16px 0;
            border-bottom: 1px solid #f0f2f5;
            font-size: 15px;
        }
        .info-row:last-child { border-bottom: none; }
        .info-label { color: #888; font-weight: 500; }
        .info-value { color: #1a237e; font-weight: 600; }
        .badge {
            display: inline-block;
            background: #e8eaf6;
            color: #1a237e;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
        }
    </style>
</head>
<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="page-content">
    <div class="card">
        <div class="student-header">
            <img src="https://i.pravatar.cc/80?img=47" class="student-avatar" alt="Student"/>
            <div>
                <h1 th:text="${studentName}">Student Name</h1>
                <p>Student Profile</p>
            </div>
        </div>

        <div class="info-row">
            <span class="info-label">Full Name</span>
            <span class="info-value" th:text="${studentName}">-</span>
        </div>
        <div class="info-row">
            <span class="info-label">Course</span>
            <span class="info-value" th:text="${course}">-</span>
        </div>
        <div class="info-row">
            <span class="info-label">Semester</span>
            <span class="info-value">
                <span class="badge" th:text="${semester}">-</span>
            </span>
        </div>
        <div class="info-row">
            <span class="info-label">Status</span>
            <span class="info-value">
                <span class="badge">✅ Active</span>
            </span>
        </div>
        <div class="info-row">
            <span class="info-label">University</span>
            <span class="info-value">Lovely Professional University</span>
        </div>
    </div>
</div>

<div th:replace="~{fragments/footer :: footer}"></div>

</body>
</html>
