<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>ESchool Portal - Contact</title>
    <meta charset="UTF-8"/>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #f0f2f5;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        .page-content {
            flex: 1;
            max-width: 900px;
            margin: 48px auto;
            padding: 0 24px;
            width: 100%;
        }
        .card {
            background: #fff;
            border-radius: 12px;
            padding: 40px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
        }
        .card h1 { color: #1a237e; font-size: 32px; margin-bottom: 8px; }
        .card .subtitle {
            color: #7986cb;
            font-size: 15px;
            margin-bottom: 28px;
            padding-bottom: 20px;
            border-bottom: 2px solid #e8eaf6;
        }
        .contact-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 16px;
        }
        .contact-item {
            background: #e8eaf6;
            border-radius: 10px;
            padding: 20px 24px;
        }
        .contact-item h4 { color: #1a237e; margin-bottom: 6px; font-size: 15px; }
        .contact-item p { color: #555; font-size: 14px; line-height: 1.7; }
    </style>
</head>
<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="page-content">
    <div class="card">
        <h1>Contact Us</h1>
        <p class="subtitle">We're here to help — reach out anytime</p>
        <div class="contact-grid">
            <div class="contact-item">
                <h4>📧 Email</h4>
                <p>info@eschool.edu.in<br/>admissions@eschool.edu.in</p>
            </div>
            <div class="contact-item">
                <h4>📞 Phone</h4>
                <p>+91-98765-43210<br/>+91-98765-43211</p>
            </div>
            <div class="contact-item">
                <h4>📍 Address</h4>
                <p>Lovely Professional University,<br/>Phagwara, Punjab - 144411</p>
            </div>
            <div class="contact-item">
                <h4>⏰ Office Hours</h4>
                <p>Mon - Fri: 9:00 AM - 5:00 PM<br/>Sat: 9:00 AM - 1:00 PM</p>
            </div>
        </div>
    </div>
</div>

<div th:replace="~{fragments/footer :: footer}"></div>

</body>
</html>
