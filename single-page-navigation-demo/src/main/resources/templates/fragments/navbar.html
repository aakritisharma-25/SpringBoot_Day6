<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<nav th:fragment="navbar">
    <style>
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: #e8eaf6;
            padding: 12px 28px;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
            border-bottom: 2px solid #c5cae9;
        }
        .nav-links {
            display: flex;
            gap: 6px;
            list-style: none;
            margin: 0;
            padding: 0;
        }
        .nav-links a {
            color: #1a237e;
            text-decoration: none;
            padding: 8px 18px;
            border-radius: 6px;
            font-size: 15px;
            font-weight: 600;
            transition: background 0.2s;
            font-family: 'Segoe UI', sans-serif;
        }
        .nav-links a:hover {
            background-color: #c5cae9;
            color: #0d1b6e;
        }
        .nav-right {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .nav-right img {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            border: 2px solid #3949ab;
            object-fit: cover;
        }
        .nav-right span {
            color: #1a237e;
            font-size: 13px;
            font-family: 'Segoe UI', sans-serif;
            font-weight: 600;
        }
    </style>

    <!-- LEFT: nav links -->
    <ul class="nav-links">
        <li><a th:href="@{/}">🏠 Home</a></li>
        <li><a th:href="@{/about}">ℹ️ About</a></li>
        <li><a th:href="@{/contact}">📞 Contact</a></li>
        <li><a th:href="@{/student}">🎓 Student</a></li>
    </ul>

    <!-- RIGHT: profile image -->
    <div class="nav-right">
        <span>ESchool</span>
        <img src="https://i.pravatar.cc/44?img=12" alt="Profile"/>
    </div>
</nav>
</body>
</html>
