spring.application.name=ApiGateway
server.port=9090

eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

# use lb:// (load balanced) instead of http://localhost:port
spring.cloud.gateway.server.webmvc.routes[0].id=Product
spring.cloud.gateway.server.webmvc.routes[0].uri=lb://ProductService
spring.cloud.gateway.server.webmvc.routes[0].predicates[0]=Path=/products/**

spring.cloud.gateway.server.webmvc.routes[1].id=Cart
spring.cloud.gateway.server.webmvc.routes[1].uri=lb://CartService
spring.cloud.gateway.server.webmvc.routes[1].predicates[0]=Path=/cart/**